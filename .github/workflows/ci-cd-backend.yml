name: CI/CD / Backend

# Triggers only when backend files change — frontend changes won't run this workflow
on:
  push:
    paths: ['backend/**']
  pull_request:
    branches: [main]
    paths: ['backend/**']

# Cancel any in-progress run for the same branch when a new commit is pushed,
# so we don't waste runner minutes on outdated builds
concurrency:
  group: ci-cd-backend-${{ github.ref }}
  cancel-in-progress: true

jobs:
  # Runs fast, isolated unit tests (H2 in-memory DB, no external dependencies)
  unit-tests:
    name: Unit Tests
    runs-on: ubuntu-22.04

    defaults:
      run:
        working-directory: backend

    steps:
      - uses: actions/checkout@v4

      - name: Set up Java 25
        uses: actions/setup-java@v4
        with:
          java-version: '25'
          distribution: temurin
          cache: maven

      - name: Run unit tests
        run: ./mvnw --no-transfer-progress -DexcludedGroups=integration test

      # Report is uploaded even on failure so the team can inspect what broke
      - name: Upload unit test report
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: backend-unit-test-report
          path: backend/target/surefire-reports/

  # Runs slower integration tests that may spin up real infrastructure
  integration-tests:
    name: Integration Tests
    runs-on: ubuntu-22.04

    defaults:
      run:
        working-directory: backend

    steps:
      - uses: actions/checkout@v4

      - name: Set up Java 25
        uses: actions/setup-java@v4
        with:
          java-version: '25'
          distribution: temurin
          cache: maven

      - name: Run integration tests
        run: ./mvnw --no-transfer-progress -Dgroups=integration test

      - name: Upload integration test report
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: backend-integration-test-report
          path: backend/target/surefire-reports/

  # Runs in parallel with the test jobs — builds the Docker image and pushes to GHCR
  # on merges to main; PRs only build (no push) to validate the Dockerfile
  build-docker:
    name: Build & Push Backend Image
    runs-on: ubuntu-22.04
    permissions:
      contents: read
      packages: write  # required to push to and clean up GHCR

    steps:
      - uses: actions/checkout@v4

      # Buildx enables advanced features like layer caching and multi-platform builds
      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      # GITHUB_TOKEN is automatically available — no manual secrets needed for GHCR
      # Skip login on PRs since we won't push from untrusted forks
      - name: Log in to GHCR
        if: github.event_name == 'push' && github.ref == 'refs/heads/main'
        uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      # Produces two tags:
      #   sha-<commit> — pinned, traceable to the exact commit
      #   latest       — always points to the most recent main build
      - name: Extract metadata
        id: meta
        uses: docker/metadata-action@v5
        with:
          images: ghcr.io/${{ github.repository_owner }}/pms-backend
          tags: |
            type=sha
            type=raw,value=latest,enable=${{ github.ref == 'refs/heads/main' }}

      - name: Build and push backend image
        uses: docker/build-push-action@v6
        with:
          context: ./backend
          push: ${{ github.event_name == 'push' && github.ref == 'refs/heads/main' }}
          tags: ${{ steps.meta.outputs.tags }}
          labels: ${{ steps.meta.outputs.labels }}
          # GHA cache keeps Docker layers warm across runs — speeds up rebuilds
          # when only source files change (dependencies layer stays cached)
          cache-from: type=gha,scope=backend
          cache-to: type=gha,mode=max,scope=backend

      # Prune old versions after every push to keep GHCR storage bounded
      # The 10 most recent versions are kept; everything older is deleted
      - name: Delete old package versions
        if: github.event_name == 'push' && github.ref == 'refs/heads/main'
        uses: actions/delete-package-versions@v5
        with:
          package-name: pms-backend
          package-type: container
          min-versions-to-keep: 10

  # Triggers Railway to pull and run the new image — only after image is pushed AND all tests pass
  deploy:
    name: Deploy Backend to Railway
    runs-on: ubuntu-22.04
    needs: [build-docker, unit-tests, integration-tests]
    if: github.event_name == 'push' && github.ref == 'refs/heads/main'

    steps:
      - name: Install Railway CLI
        run: npm install -g @railway/cli@4.58.0

      - name: Redeploy backend
        run: railway redeploy --service pms-backend --yes
        env:
          RAILWAY_TOKEN: ${{ secrets.RAILWAY_TOKEN }}
