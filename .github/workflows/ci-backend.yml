name: CI / Backend

on:
  push:
    paths: ['backend/**']
  pull_request:
    branches: [main]
    paths: ['backend/**']

concurrency:
  group: ci-backend-${{ github.ref }}
  cancel-in-progress: true

jobs:
  unit-tests:
    name: Unit Tests
    runs-on: ubuntu-22.04

    defaults:
      run:
        working-directory: backend

    steps:
      - uses: actions/checkout@v4

      - name: Set up Java 25
        uses: actions/setup-java@v4
        with:
          java-version: '25'
          distribution: temurin
          cache: maven

      - name: Run unit tests
        run: ./mvnw --no-transfer-progress -DexcludedGroups=integration test

      - name: Upload unit test report
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: backend-unit-test-report
          path: backend/target/surefire-reports/

  integration-tests:
    name: Integration Tests
    runs-on: ubuntu-22.04

    defaults:
      run:
        working-directory: backend

    steps:
      - uses: actions/checkout@v4

      - name: Set up Java 25
        uses: actions/setup-java@v4
        with:
          java-version: '25'
          distribution: temurin
          cache: maven

      - name: Run integration tests
        run: ./mvnw --no-transfer-progress -Dgroups=integration test

      - name: Upload integration test report
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: backend-integration-test-report
          path: backend/target/surefire-reports/

  build-docker:
    name: Build Backend Image
    runs-on: ubuntu-22.04
    steps:
      - uses: actions/checkout@v4

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Build backend image
        uses: docker/build-push-action@v6
        with:
          context: ./backend
          push: false
          tags: pms-backend:${{ github.sha }}
          cache-from: type=gha,scope=backend
          cache-to: type=gha,mode=max,scope=backend
