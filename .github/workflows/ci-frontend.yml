name: CI / Frontend

# Triggers only when frontend files change — backend changes won't run this workflow
on:
  push:
    paths: ['frontend/**']
  pull_request:
    branches: [main]
    paths: ['frontend/**']

# Cancel any in-progress run for the same branch when a new commit is pushed,
# so we don't waste runner minutes on outdated builds
concurrency:
  group: ci-frontend-${{ github.ref }}
  cancel-in-progress: true

jobs:
  # Lint, type-check, test, and build the React app to catch errors before Docker
  build-and-test:
    name: Build & Test (React)
    runs-on: ubuntu-22.04

    defaults:
      run:
        working-directory: frontend

    steps:
      - uses: actions/checkout@v4

      - name: Set up Node.js 24
        uses: actions/setup-node@v4
        with:
          node-version: '24'
          cache: npm
          cache-dependency-path: frontend/package-lock.json

      - name: Install dependencies
        run: npm ci

      # continue-on-error so lint warnings don't block the pipeline
      - name: Lint
        run: npm run lint --if-present
        continue-on-error: true

      - name: Type check
        run: npm run typecheck

      - name: Test
        run: npm test

  # Runs in parallel with build-and-test — builds the Docker image and pushes to GHCR
  # on merges to main; PRs only build (no push) to validate the Dockerfile
  build-docker:
    name: Build & Push Frontend Image
    runs-on: ubuntu-22.04
    permissions:
      contents: read
      packages: write  # required to push to and clean up GHCR

    steps:
      - uses: actions/checkout@v4

      # Buildx enables advanced features like layer caching and multi-platform builds
      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      # GITHUB_TOKEN is automatically available — no manual secrets needed for GHCR
      # Skip login on PRs since we won't push from untrusted forks
      - name: Log in to GHCR
        if: github.event_name == 'push' && github.ref == 'refs/heads/main'
        uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      # Produces two tags:
      #   sha-<commit> — pinned, traceable to the exact commit
      #   latest       — always points to the most recent main build
      - name: Extract metadata
        id: meta
        uses: docker/metadata-action@v5
        with:
          images: ghcr.io/${{ github.repository_owner }}/pms-frontend
          tags: |
            type=sha
            type=raw,value=latest,enable=${{ github.ref == 'refs/heads/main' }}

      - name: Build and push frontend image
        uses: docker/build-push-action@v6
        with:
          context: ./frontend
          push: ${{ github.event_name == 'push' && github.ref == 'refs/heads/main' }}
          tags: ${{ steps.meta.outputs.tags }}
          labels: ${{ steps.meta.outputs.labels }}
          # GHA cache keeps Docker layers warm across runs — speeds up rebuilds
          # when only source files change (dependencies layer stays cached)
          cache-from: type=gha,scope=frontend
          cache-to: type=gha,mode=max,scope=frontend

      # Prune old versions after every push to keep GHCR storage bounded
      # The 10 most recent versions are kept; everything older is deleted
      - name: Delete old package versions
        if: github.event_name == 'push' && github.ref == 'refs/heads/main'
        uses: actions/delete-package-versions@v5
        with:
          package-name: pms-frontend
          package-type: container
          min-versions-to-keep: 10
