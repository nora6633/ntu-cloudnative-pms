spring:
  application:
    name: pms
  datasource:
    url: ${SPRING_DATASOURCE_URL}
    username: ${SPRING_DATASOURCE_USERNAME}
    password: ${SPRING_DATASOURCE_PASSWORD}
    driver-class-name: com.mysql.cj.jdbc.Driver
  jpa:
    hibernate:
      ddl-auto: update
    show-sql: true
    properties:
      hibernate:
        format_sql: true
        use_sql_comments: true
  jackson:
    serialization:
      indent_output: true
    deserialization:
      fail-on-unknown-properties: false
server:
  port: 8080
  servlet:
    context-path: /api
logging:
  level:
    root: INFO
    org.springframework: INFO
    edu.ntu.pms: DEBUG