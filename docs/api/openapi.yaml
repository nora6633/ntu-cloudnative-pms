openapi: 3.1.0
info:
  title: PMS API
  description: |
    Performance Management System (PMS) HTTP API.

    This file is the **source of truth** for the API contract.
    Update it before changing backend implementation or frontend usage.
  version: 0.1.0
  license:
    name: Internal
servers:
  - url: http://localhost:8080/api
    description: Local dev (devcontainer)

tags:
  - name: Auth
    description: Login, logout, and current-user lookup. Tokens are issued as HttpOnly cookies; clients never read the token directly.

paths:
  /auth/login:
    post:
      tags: [Auth]
      summary: Log in with username and password
      description: |
        On success, sets an `HttpOnly`, `SameSite=Lax` cookie named `AUTH_TOKEN`
        carrying a signed JWT. The cookie's `Secure` flag follows the
        `COOKIE_SECURE` environment variable (off in dev, on in prod).
      operationId: login
      security: []
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/LoginRequest'
      responses:
        '200':
          description: Authenticated successfully.
          headers:
            Set-Cookie:
              description: Sets the `AUTH_TOKEN` cookie.
              schema:
                type: string
                example: AUTH_TOKEN=eyJhbGciOi...; Path=/; HttpOnly; SameSite=Lax
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/UserResponse'
        '400':
          $ref: '#/components/responses/BadRequest'
        '401':
          description: Invalid credentials.
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'

  /auth/logout:
    post:
      tags: [Auth]
      summary: Log out the current user
      description: Clears the `AUTH_TOKEN` cookie. Idempotent — does not require an authenticated request.
      operationId: logout
      security: []
      responses:
        '204':
          description: Logged out.
          headers:
            Set-Cookie:
              description: Clears the `AUTH_TOKEN` cookie.
              schema:
                type: string
                example: AUTH_TOKEN=; Path=/; HttpOnly; SameSite=Lax; Max-Age=0

  /auth/me:
    get:
      tags: [Auth]
      summary: Return the currently logged-in user
      description: Reads the `AUTH_TOKEN` cookie and returns the user encoded in the JWT.
      operationId: getCurrentUser
      responses:
        '200':
          description: Current user.
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/UserResponse'
        '401':
          description: Not logged in or token expired/invalid.
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'

components:
  securitySchemes:
    cookieAuth:
      type: apiKey
      in: cookie
      name: AUTH_TOKEN
      description: HttpOnly JWT cookie set by `/auth/login`.

  schemas:
    LoginRequest:
      type: object
      required: [username, password]
      properties:
        username:
          type: string
          minLength: 1
          maxLength: 64
          example: admin
        password:
          type: string
          minLength: 1
          format: password
          example: admin123

    UserResponse:
      type: object
      required: [id, username, role]
      properties:
        id:
          type: integer
          format: int64
          example: 1
        username:
          type: string
          example: admin
        role:
          $ref: '#/components/schemas/Role'

    Role:
      type: string
      enum: [ADMIN, HR, MANAGER, EMPLOYEE]
      description: |
        Role-based authorization tier. Will be the role embedded in the JWT
        and returned by `/auth/me`.

    ErrorResponse:
      type: object
      required: [message]
      properties:
        message:
          type: string
          example: Authentication required

  responses:
    BadRequest:
      description: Request body failed validation.
      content:
        application/json:
          schema:
            $ref: '#/components/schemas/ErrorResponse'

security:
  - cookieAuth: []
