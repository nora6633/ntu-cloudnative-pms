<svg width="100%" viewBox="0 0 680 320" role="img" xmlns="http://www.w3.org/2000/svg">
<title>System ERD compact</title>
<desc>Compact horizontal ERD with entity names and relation labels.</desc>
<defs>
  <marker id="arr" viewBox="0 0 10 10" refX="8" refY="5" markerWidth="5" markerHeight="5" orient="auto-start-reverse">
    <path d="M2 1L8 5L2 9" fill="none" stroke="context-stroke" stroke-width="1.5" stroke-linecap="round" stroke-linejoin="round"/>
  </marker>
  <style>
    text { font-family: sans-serif; }
    .th  { font-size: 12px; font-weight: 500; fill: #085041; }
    .ts  { font-size: 10px; fill: #444441; }
    .c-teal   rect { fill: #1D9E75; stroke: #0F6E56; }
    .c-teal   text { fill: #E1F5EE; }
    .c-blue   rect { fill: #378ADD; stroke: #185FA5; }
    .c-blue   text { fill: #E6F1FB; }
    .c-purple rect { fill: #7F77DD; stroke: #534AB7; }
    .c-purple text { fill: #EEEDFE; }
    .c-gray   rect { fill: #888780; stroke: #5F5E5A; }
    .c-gray   text { fill: #F1EFE8; }
    .c-coral  rect { fill: #D85A30; stroke: #993C1D; }
    .c-coral  text { fill: #FAECE7; }
  </style>
</defs>

<!-- COL A: jobs, users, departments -->
<g class="c-teal">
  <rect x="10" y="20" width="110" height="24" rx="4" stroke-width="0.5"/>
  <text class="th" x="65" y="32" text-anchor="middle" dominant-baseline="central">jobs</text>
</g>
<g class="c-blue">
  <rect x="10" y="110" width="110" height="24" rx="4" stroke-width="0.5"/>
  <text class="th" x="65" y="122" text-anchor="middle" dominant-baseline="central">users</text>
</g>
<g class="c-blue">
  <rect x="10" y="210" width="110" height="24" rx="4" stroke-width="0.5"/>
  <text class="th" x="65" y="222" text-anchor="middle" dominant-baseline="central">departments</text>
</g>

<!-- COL B: templates, evaluations -->
<g class="c-teal">
  <rect x="200" y="20" width="120" height="24" rx="4" stroke-width="0.5"/>
  <text class="th" x="260" y="32" text-anchor="middle" dominant-baseline="central">templates</text>
</g>
<g class="c-teal">
  <rect x="200" y="110" width="120" height="24" rx="4" stroke-width="0.5"/>
  <text class="th" x="260" y="122" text-anchor="middle" dominant-baseline="central">evaluations</text>
</g>

<!-- COL C: template_criteria, evaluation_items, goals -->
<g class="c-purple">
  <rect x="390" y="20" width="138" height="24" rx="4" stroke-width="0.5"/>
  <text class="th" x="459" y="32" text-anchor="middle" dominant-baseline="central">template_criteria</text>
</g>
<g class="c-purple">
  <rect x="390" y="110" width="138" height="24" rx="4" stroke-width="0.5"/>
  <text class="th" x="459" y="122" text-anchor="middle" dominant-baseline="central">evaluation_items</text>
</g>
<g class="c-purple">
  <rect x="390" y="200" width="110" height="24" rx="4" stroke-width="0.5"/>
  <text class="th" x="445" y="212" text-anchor="middle" dominant-baseline="central">goals</text>
</g>

<!-- COL D: revinfo, audit_tables, goal_criteria, goal_progresses -->
<g class="c-gray">
  <rect x="556" y="20" width="114" height="24" rx="4" stroke-width="0.5"/>
  <text class="th" x="613" y="32" text-anchor="middle" dominant-baseline="central">revinfo</text>
</g>
<g class="c-gray">
  <rect x="556" y="110" width="114" height="24" rx="4" stroke-width="0.5"/>
  <text class="th" x="613" y="122" text-anchor="middle" dominant-baseline="central">audit_tables</text>
</g>
<g class="c-coral">
  <rect x="556" y="200" width="114" height="24" rx="4" stroke-width="0.5"/>
  <text class="th" x="613" y="212" text-anchor="middle" dominant-baseline="central">goal_progresses</text>
</g>

<!-- CONNECTORS -->
<line x1="120" y1="32" x2="200" y2="32" fill="none" stroke="#444441" stroke-width="1.2" marker-end="url(#arr)"/>
<text font-size="10" fill="#444441" x="160" y="26" text-anchor="middle">linked to</text>

<line x1="65" y1="110" x2="65" y2="44" fill="none" stroke="#444441" stroke-width="1.2" marker-end="url(#arr)"/>
<text font-size="10" fill="#444441" x="71" y="80" text-anchor="start">has</text>

<line x1="120" y1="122" x2="200" y2="122" fill="none" stroke="#444441" stroke-width="1.2" marker-end="url(#arr)"/>
<text font-size="10" fill="#444441" x="160" y="116" text-anchor="middle">employee /</text>
<text font-size="10" fill="#444441" x="160" y="128" text-anchor="middle">supervisor</text>

<line x1="65" y1="134" x2="65" y2="210" fill="none" stroke="#444441" stroke-width="1.2" marker-end="url(#arr)"/>
<text font-size="10" fill="#444441" x="71" y="175" text-anchor="start">belongs to / oversee</text>

<line x1="320" y1="32" x2="390" y2="32" fill="none" stroke="#444441" stroke-width="1.2" marker-end="url(#arr)"/>
<text font-size="10" fill="#444441" x="355" y="26" text-anchor="middle">has</text>

<path d="M230 110 L230 44" fill="none" stroke="#444441" stroke-width="1.2" marker-end="url(#arr)"/>
<text font-size="10" fill="#444441" x="236" y="80" text-anchor="start">snapshot</text>

<line x1="320" y1="122" x2="390" y2="122" fill="none" stroke="#444441" stroke-width="1.2" marker-end="url(#arr)"/>
<text font-size="10" fill="#444441" x="355" y="116" text-anchor="middle">contains</text>

<path d="M260 134 L260 212 L390 212" fill="none" stroke="#444441" stroke-width="1.2" marker-end="url(#arr)"/>
<text font-size="10" fill="#444441" x="266" y="178" text-anchor="start">tracks</text>

<path d="M120 222 L170 222 L170 134" fill="none" stroke="#444441" stroke-width="1.2" marker-end="url(#arr)"/>
<text font-size="10" fill="#444441" x="176" y="185" text-anchor="start">scoped to</text>

<line x1="500" y1="212" x2="556" y2="212" fill="none" stroke="#444441" stroke-width="1.2" marker-end="url(#arr)"/>
<text font-size="10" fill="#444441" x="528" y="206" text-anchor="middle">logged in</text>

<line x1="613" y1="44" x2="613" y2="110" fill="none" stroke="#444441" stroke-width="1.2" stroke-dasharray="3 2" marker-end="url(#arr)"/>
<text font-size="10" fill="#444441" x="619" y="80" text-anchor="start">auto-audits</text>

</svg>
